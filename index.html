<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE6;
  --accent: #2D5016;
  --accent2: #5A8A2E;
  --text: #1A1A18;
  --text2: #6B6860;
  --text3: #9C9A94;
  --border: rgba(0,0,0,0.08);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; }
.header { background: var(--accent); color: white; padding: 52px 20px 20px; position: sticky; top: 0; z-index: 100; }
.header h1 { font-size: 20px; font-weight: 700; }
.header .sub { font-size: 12px; opacity: 0.7; margin-top: 2px; font-family: 'DM Mono', monospace; }
.tabs { display: flex; background: var(--accent); padding: 0 20px 16px; gap: 6px; position: sticky; top: 88px; z-index: 100; }
.tab { flex: 1; padding: 8px 4px; border: none; border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.7); transition: 0.2s; }
.tab.active { background: white; color: var(--accent); }
.content { padding: 16px 20px 100px; }
.section { display: none; }
.section.active { display: block; }
.upload-card { background: var(--surface); border-radius: var(--radius); border: 2px dashed var(--accent2); padding: 28px 20px; text-align: center; cursor: pointer; margin-bottom: 12px; }
.upload-icon { font-size: 40px; margin-bottom: 10px; }
.upload-card p { font-size: 14px; color: var(--text2); line-height: 1.6; }
.upload-card strong { color: var(--accent); }
#img-input { display: none; }
.ai-result-card { background: #EEF5E6; border-radius: var(--radius); padding: 16px; margin-bottom: 12px; display: none; }
.ai-result-card .result-title { font-size: 12px; color: var(--accent); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 10px; }
.result-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; padding: 6px 0; border-bottom: 1px solid rgba(45,80,22,0.1); }
.result-label { color: var(--text2); }
.result-value { font-weight: 500; }
.confirm-btn { width: 100%; margin-top: 12px; padding: 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
.confirm-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.form-card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin-bottom: 12px; }
.section-label { font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; margin-bottom: 14px; }
.field { margin-bottom: 14px; }
.field label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 6px; }
.field input, .field select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; background: var(--surface); color: var(--text); appearance: auto; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.add-btn { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 16px; font-weight: 700; cursor: pointer; }
.msg { font-size: 13px; text-align: center; margin-top: 10px; height: 18px; }
.filter-row { display: flex; gap: 8px; margin-bottom: 14px; }
.filter-row select { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 14px; background: var(--surface); color: var(--text); }
.export-btn { padding: 10px 14px; background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; cursor: pointer; color: var(--text2); white-space: nowrap; }
.entry-item { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; }
.entry-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.entry-info { flex: 1; min-width: 0; }
.entry-payee { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.entry-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
.entry-amount { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 500; flex-shrink: 0; }
.entry-del { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; padding: 4px; flex-shrink: 0; }
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 14px; }

.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(26,26,24,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-box { background: var(--bg); width: 85%; max-width: 320px; padding: 24px; border-radius: var(--radius); }

.owner-btn:active { background: var(--surface2); }
.cancel-btn { width: 100%; padding: 10px; background: transparent; color: var(--text2); border: none; font-size: 13px; cursor: pointer; margin-top: 5px; }

.ai-input { border: 1px solid var(--border); background: white; border-radius: 6px; padding: 4px 8px; font-family: inherit; font-size: 14px; text-align: right; width: 100px; color: var(--text); }
.ai-select { border: 1px solid var(--border); background: white; border-radius: 6px; padding: 4px; font-family: inherit; font-size: 13px; color: var(--text); }

.cat-list { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
.cat-pill { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: var(--surface2); color: var(--text2); }
.dot-食費 { background: #5A8A2E; }
.dot-外食 { background: #E07B3A; }
.dot-交通費 { background: #3A7BE0; }
.dot-日用品 { background: #9B59B6; }
.dot-その他 { background: #95A5A6; }

/* APIキー設定カード */
.api-card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px; }
.api-card-header { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.api-card-header .section-label { margin: 0; }
.api-status { font-size: 12px; }
.api-body { margin-top: 12px; }
.api-body .field { margin-bottom: 10px; }
.api-save-btn { padding: 8px 18px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; }

/* ローディング */
@keyframes spin { to { transform: rotate(360deg); } }
.spinner { display: inline-block; width: 22px; height: 22px; border: 2.5px solid rgba(45,80,22,0.25); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
</style>

<body>

<div class="header">
  <h1>🧾 レシート管理</h1>
  <div class="sub">My Expense Tracker</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add')">追加</button>
  <button class="tab" onclick="switchTab('list')">一覧</button>
  <button class="tab" onclick="switchTab('monthly')">個人集計</button>
</div>

<div class="content">
  <div id="tab-add" class="section active">

    <!-- APIキー設定 -->
    <div class="api-card">
      <div class="api-card-header" onclick="toggleApiSettings()">
        <div class="section-label">🔑 AI設定（Groq・完全無料）</div>
        <span class="api-status" id="api-key-status" style="color:var(--text3)">未設定</span>
      </div>
      <div class="api-body" id="api-settings-body" style="display:none;">
        <div style="font-size:12px; color:var(--text2); margin-bottom:10px; line-height:1.6;">
          <a href="https://console.groq.com/keys" target="_blank" style="color:var(--accent);">console.groq.com/keys</a> で無料取得 → 「Create API Key」
        </div>
        <div class="field" style="margin-bottom:10px;">
          <label>APIキーを入力（gsk_...）</label>
          <input type="password" id="api-key-input" placeholder="gsk_..."
            style="font-family:'DM Mono',monospace; font-size:13px; letter-spacing:0.02em;">
        </div>
        <button class="api-save-btn" onclick="saveApiKey()">保存する</button>
        <button onclick="clearApiKey()" style="margin-left:8px; padding:8px 12px; background:none; border:1px solid var(--border); border-radius:var(--radius-sm); font-size:12px; color:var(--text3); cursor:pointer;">削除</button>
      </div>
    </div>

    <div class="upload-card" onclick="document.getElementById('img-input').click()">
      <div class="upload-icon">📷</div>
      <p><strong>レシートの写真をアップロード</strong><br>タップして画像を選択<br><small style="color:var(--text3)">Groq AI で店名・金額・通貨を自動読み取り（完全無料）</small></p>
      <input type="file" id="img-input" accept="image/*" onchange="handleImage(event)">
    </div>

    <div class="ai-result-card" id="ai-result">
      <div class="result-title">📋 AI読み取り結果（ダブルチェック）</div>
      <div id="ai-rows"></div>
      <button class="confirm-btn" id="confirm-btn" onclick="confirmAI()">✓ 確 認（この内容で追加）</button>
    </div>

    <div class="form-card">
      <div class="section-label">✏️ 手動入力</div>
      <div class="field-row">
        <div class="field"><label>日付</label><input type="date" id="f-date"></div>
        <div class="field"><label>担当者</label>
          <select id="f-owner">
            <option value="Kensei">Kensei</option>
            <option value="Kazuki">Kazuki</option>
            <option value="Hirotaka">Hirotaka</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>カテゴリ</label><select id="f-cat"><option value="食費">食費</option><option value="外食">外食</option><option value="交通費">交通費</option><option value="日用品">日用品</option><option value="その他">その他</option></select></div>
        <div class="field"><label>通貨</label><select id="f-currency"><option value="SGD">SGD ($)</option><option value="JPY">JPY (¥)</option></select></div>
      </div>
      <div class="field"><label>支払先</label><input type="text" id="f-payee" placeholder="例：スーパー田中"></div>
      <div class="field"><label>金額</label><input type="number" id="f-amount" placeholder="0" step="0.01"></div>
      <div class="field"><label>メモ（任意）</label><input type="text" id="f-memo"></div>
      <button class="add-btn" onclick="addEntry()">追加する</button>

  <div id="tab-list" class="section">

      <select id="filter-month" onchange="renderList()"><option value="">すべての月</option></select>
      <button class="export-btn" onclick="exportCSV()">CSV出力</button>
    </div>
    <div id="entry-list"><div class="empty">レシートがまだありません</div></div>
  </div>

  <div id="tab-monthly" class="section">
    <div class="total-card">
      <div class="total-item">
        <div class="tl">Kensei</div>
        <div class="tv" id="m-kensei">¥0<br>$0</div>
      </div>
      <div class="total-item">
        <div class="tl">Kazuki</div>
        <div class="tv" id="m-kazuki">¥0<br>$0</div>
      </div>
      <div class="total-item">
        <div class="tl">Hirotaka</div>
        <div class="tv" id="m-hirotaka">¥0<br>$0</div>
      </div>
    </div>
    <div id="monthly-chart"><div class="empty">データがありません</div></div>
  </div>
</div>

<div id="owner-modal" class="modal-overlay">
  <div class="modal-box">
    <div class="section-label" style="text-align:center; font-size:14px; margin-bottom:20px;">👤 誰のレシートですか？</div>
    <button class="owner-btn" onclick="selectOwner('Kensei')">Kensei</button>
    <button class="owner-btn" onclick="selectOwner('Kazuki')">Kazuki</button>
    <button class="owner-btn" onclick="selectOwner('Hirotaka')">Hirotaka</button>
    <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
  </div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem('receipt_entries_v3') || '[]');
let aiData = null;
let imageFile = null; // Bug fix: ファイル参照をモーダル前に保存する

document.getElementById('f-date').valueAsDate = new Date();

// APIキー状態を初期化
(function initApiKeyStatus() {
  const key = localStorage.getItem('groq_api_key');
  if (key) {
    setApiKeyStatus(true);
  } else {
    document.getElementById('api-settings-body').style.display = 'block';
  }
})();

function toggleApiSettings() {
  const body = document.getElementById('api-settings-body');
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function setApiKeyStatus(isSet) {
  const el = document.getElementById('api-key-status');
  if (isSet) {
    el.textContent = '設定済み ✓';
    el.style.color = 'var(--accent)';
  } else {
    el.textContent = '未設定';
    el.style.color = 'var(--text3)';
  }
}

function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { showMessage('APIキーを入力してください', '#e74c3c'); return; }
  localStorage.setItem('groq_api_key', key);
  document.getElementById('api-key-input').value = '';
  document.getElementById('api-settings-body').style.display = 'none';
  setApiKeyStatus(true);
  showMessage('APIキーを保存しました');
}

function clearApiKey() {
  if (!confirm('APIキーを削除しますか？')) return;
  localStorage.removeItem('groq_api_key');
  setApiKeyStatus(false);
  document.getElementById('api-settings-body').style.display = 'block';
}

function save() {
  localStorage.setItem('receipt_entries_v3', JSON.stringify(entries));
  updateMonthFilter();
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el, i) => el.classList.toggle('active', ['add','list','monthly'][i] === t));
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + t).classList.add('active');
  if (t === 'list') renderList();
  if (t === 'monthly') renderMonthly();
}

function handleImage(e) {
  if (!e.target.files[0]) return;
  // Bug fix: e.target.value をクリアする前にファイル参照を保存
  imageFile = e.target.files[0];
  e.target.value = ''; // 連続アップロード用にリセット
  document.getElementById('owner-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('owner-modal').style.display = 'none';
}

async function selectOwner(ownerName) {
  closeModal();

  const card = document.getElementById('ai-result');
  const rows = document.getElementById('ai-rows');
  const confirmBtn = document.getElementById('confirm-btn');

  card.style.display = 'block';
  confirmBtn.disabled = true;
  rows.innerHTML = `
    <div style="text-align:center; padding:24px 0;">
      <div class="spinner" style="margin:0 auto 10px;"></div>
      <div style="color:var(--text2); font-size:13px;">Groq AI が解析中...</div>
    </div>`;

  const apiKey = localStorage.getItem('groq_api_key');

  let errorMsg = null;

  if (apiKey && imageFile) {
    try {
      const result = await analyzeReceipt(imageFile, apiKey);
      aiData = { ...result, owner: ownerName };
    } catch (err) {
      console.error('AI解析エラー:', err);
      aiData = defaultAiData(ownerName);
      errorMsg = err.message;
    }
  } else {
    aiData = defaultAiData(ownerName);
    if (!apiKey) {
      errorMsg = 'APIキー未設定 — 上の「AI設定」からキーを入力してください';
    }
  }

  imageFile = null;
  confirmBtn.disabled = false;
  renderAIResult(errorMsg);
}

function defaultAiData(ownerName) {
  return {
    date: new Date().toISOString().split('T')[0],
    payee: '',
    amount: '',
    cat: '食費',
    owner: ownerName,
    currency: 'SGD'
  };
}

// 画像をリサイズ＆コントラスト強調してから送信（精度向上）
async function preprocessImage(file) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      // 長辺を最大1600pxに制限（細かい文字を保持しつつAPIの制限内に収める）
      const MAX = 1600;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);

      // コントラスト強調（暗いレシートでも文字を読みやすく）
      const id = ctx.getImageData(0, 0, w, h);
      const d = id.data;
      for (let i = 0; i < d.length; i += 4) {
        for (let c = 0; c < 3; c++) {
          d[i+c] = Math.min(255, Math.max(0, ((d[i+c] - 128) * 1.4) + 128));
        }
      }
      ctx.putImageData(id, 0, 0);
      canvas.toBlob(resolve, 'image/jpeg', 0.88);
    };
    img.onerror = () => resolve(file); // 失敗時は元ファイルをそのまま使用
    img.src = url;
  });
}

async function analyzeReceipt(file, apiKey) {
  // まず画像を前処理
  const processed = await preprocessImage(file);
  const base64 = await fileToBase64(processed);
  const today = new Date().toISOString().split('T')[0];

  const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'meta-llama/llama-4-scout-17b-16e-instruct',
      max_tokens: 300,
      temperature: 0,
      messages: [
        {
          role: 'system',
          content: 'あなたはレシートOCRの専門家です。レシート画像から正確に情報を抽出し、指定されたJSON形式のみ返してください。余分なテキスト・コードブロック・説明は一切不要です。'
        },
        {
          role: 'user',
          content: [
            {
              type: 'image_url',
              image_url: { url: `data:image/jpeg;base64,${base64}` }
            },
            {
              type: 'text',
              text: `このレシートを解析してください。以下のJSONのみ返してください:
{"payee":"店名","amount":数値,"currency":"SGD か JPY","date":"YYYY-MM-DD","category":"食費・外食・交通費・日用品・その他"}

【payee】レシート最上部の店名・ブランド名（例: FairPrice, 7-Eleven, マクドナルド）
【amount】"TOTAL" "Grand Total" "合計" "お会計" などの最終金額（GST・税込みの一番大きい合計値）。数値のみ。
【currency】S$・SGD・シンガポール・英語のレシート → "SGD" ／ ¥・円・JPY・日本語のレシート → "JPY"
【date】レシートに記載の購入日をYYYY-MM-DD形式に変換。見つからなければ "${today}"
【category】スーパー・コンビニ・食料品 → "食費" ／ カフェ・レストラン・フードコート・居酒屋 → "外食" ／ MRT・バス・タクシー・Grab → "交通費" ／ ドラッグストア・日用品・文具 → "日用品" ／ その他 → "その他"`
            }
          ]
        }
      ]
    })
  });

  if (!response.ok) {
    const errData = await response.json().catch(() => ({}));
    throw new Error(errData.error?.message || `HTTP ${response.status}`);
  }

  const data = await response.json();
  const text = data.choices?.[0]?.message?.content || '';
  const jsonMatch = text.match(/\{[\s\S]*?\}/);
  if (!jsonMatch) throw new Error('JSONを取得できませんでした');

  const p = JSON.parse(jsonMatch[0]);
  return {
    date: p.date || today,
    payee: String(p.payee || ''),
    amount: Number(p.amount) || 0,
    cat: p.category || '食費',
    currency: (['SGD','JPY'].includes(p.currency) ? p.currency : 'SGD')
  };
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function escHtml(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderAIResult(errorMsg) {
  const rows = document.getElementById('ai-rows');
  const cats = ['食費','外食','交通費','日用品','その他'];
  const errorBanner = errorMsg
    ? `<div style="background:#FFF3CD; border:1px solid #FFEEBA; border-radius:8px; padding:10px 12px; margin-bottom:10px; font-size:12px; color:#856404;">
        ⚠️ AI解析エラー：${escHtml(errorMsg)}<br>
        <span style="color:var(--text2);">手動で入力してください。</span>
       </div>`
    : '';
  rows.innerHTML = errorBanner + `
    <div class="result-row">
      <span class="result-label">担当</span>
      <span class="result-value" style="color:var(--accent); font-weight:bold;">${escHtml(aiData.owner)}</span>
    </div>
    <div class="result-row">
      <span class="result-label">日付</span>
      <input type="date" id="ai-date" class="ai-input" style="width:145px; text-align:left;" value="${escHtml(aiData.date)}">
    </div>
    <div class="result-row">
      <span class="result-label">支払先</span>
      <input type="text" id="ai-payee" class="ai-input" style="width:145px; text-align:left;" value="${escHtml(aiData.payee)}">
    </div>
    <div class="result-row">
      <span class="result-label">カテゴリ</span>
      <select id="ai-cat" class="ai-select" style="width:100px;">
        ${cats.map(c => `<option value="${escHtml(c)}" ${aiData.cat === c ? 'selected' : ''}>${escHtml(c)}</option>`).join('')}
      </select>
    </div>
    <div class="result-row">
      <span class="result-label">金額 / 通貨</span>
      <div style="display:flex; gap:4px; align-items:center;">
        <input type="number" id="ai-amount" class="ai-input" step="0.01" value="${escHtml(String(aiData.amount))}">
        <select id="ai-currency" class="ai-select">
          <option value="SGD" ${aiData.currency === 'SGD' ? 'selected' : ''}>SGD</option>
          <option value="JPY" ${aiData.currency === 'JPY' ? 'selected' : ''}>JPY</option>
        </select>
      </div>
    </div>
  `;
}

function confirmAI() {
  if (!aiData) return;

  const finalDate = document.getElementById('ai-date').value;
  const finalPayee = document.getElementById('ai-payee').value.trim();
  const finalAmount = Number(document.getElementById('ai-amount').value);
  const finalCurrency = document.getElementById('ai-currency').value;
  const finalCat = document.getElementById('ai-cat').value;

  if (!finalDate || !finalPayee || !finalAmount) {
    showMessage('入力が不足しています', '#e74c3c');
    return;
  }

  entries.unshift({
    id: Date.now(),
    date: finalDate,
    payee: finalPayee,
    amount: finalAmount,
    cat: finalCat,
    owner: aiData.owner,
    currency: finalCurrency,
    memo: 'AI解析'
  });

  save();
  document.getElementById('ai-result').style.display = 'none';
  aiData = null;
  showMessage('追加しました！');
}

function addEntry() {
  const date = document.getElementById('f-date').value;
  const owner = document.getElementById('f-owner').value;
  const payee = document.getElementById('f-payee').value.trim();
  const amount = Number(document.getElementById('f-amount').value);
  const cat = document.getElementById('f-cat').value;
  const currency = document.getElementById('f-currency').value;
  const memo = document.getElementById('f-memo').value;

  if (!date || !payee || !amount) {
    showMessage('入力が不足しています', '#e74c3c');
    return;
  }

  entries.unshift({ id: Date.now(), date, owner, payee, amount, cat, currency, memo });
  save();

  document.getElementById('f-payee').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-memo').value = '';
  showMessage('追加しました！');
}

function deleteEntry(id) {
  if (!confirm('削除しますか？')) return;
  entries = entries.filter(e => e.id !== id);
  save();
  renderList();
}

function renderList() {
  const list = document.getElementById('entry-list');
  const filter = document.getElementById('filter-month').value;
  const filtered = filter ? entries.filter(e => e.date.startsWith(filter)) : entries;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">データがありません</div>';
    return;
  }

  list.innerHTML = filtered.map(e => {
    const symbol = e.currency === 'SGD' ? '$' : '¥';
    const amountStr = e.currency === 'SGD'
      ? Number(e.amount).toFixed(2)
      : Number(e.amount).toLocaleString('ja-JP');
    // Bug fix: innerHTML に直接挿入するデータはエスケープ
    return `
    <div class="entry-item">
      <div class="entry-dot dot-${escHtml(e.cat)}"></div>
      <div class="entry-info">
        <div class="entry-payee">${escHtml(e.payee)}</div>
        <div class="entry-meta">${escHtml(e.date)} / ${escHtml(e.owner)} / ${escHtml(e.cat)}${e.memo ? ' / ' + escHtml(e.memo) : ''}</div>
      </div>
      <div class="entry-amount" style="color:${e.currency === 'SGD' ? '#5A8A2E' : 'inherit'}">${escHtml(symbol + amountStr)}</div>
      <button class="entry-del" onclick="deleteEntry(${Number(e.id)})">×</button>
    </div>`;
  }).join('');
}

function renderMonthly() {
  // Bug fix: HirotakaにもSGDを追加
  const totals = {
    Kensei:   { JPY: 0, SGD: 0 },
    Kazuki:   { JPY: 0, SGD: 0 },
    Hirotaka: { JPY: 0, SGD: 0 }
  };

  entries.forEach(e => {
    if (totals[e.owner]) {
      if (e.currency === 'SGD') {
        totals[e.owner].SGD += Number(e.amount);
      } else {
        totals[e.owner].JPY += Number(e.amount);
      }
    }
  });

  const fmtSGD = n => n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmtJPY = n => n.toLocaleString('ja-JP');

  document.getElementById('m-kensei').innerHTML =
    `¥${fmtJPY(totals.Kensei.JPY)}<br><span style="color:#A0B98A">$${fmtSGD(totals.Kensei.SGD)}</span>`;
  document.getElementById('m-kazuki').innerHTML =
    `¥${fmtJPY(totals.Kazuki.JPY)}<br><span style="color:#A0B98A">$${fmtSGD(totals.Kazuki.SGD)}</span>`;
  document.getElementById('m-hirotaka').innerHTML =
    `¥${fmtJPY(totals.Hirotaka.JPY)}<br><span style="color:#A0B98A">$${fmtSGD(totals.Hirotaka.SGD)}</span>`;

  document.getElementById('monthly-chart').innerHTML = '';
}

function updateMonthFilter() {
  const sel = document.getElementById('filter-month');
  const current = sel.value;
  const months = [...new Set(entries.map(e => e.date.substring(0, 7)))].sort().reverse();
  sel.innerHTML = '<option value="">すべての月</option>' +
    months.map(m => `<option value="${escHtml(m)}">${escHtml(m)}</option>`).join('');
  sel.value = current;
}

function showMessage(txt, color = '#2D5016') {
  const m = document.getElementById('form-msg');
  m.textContent = txt;
  m.style.color = color;
  setTimeout(() => m.textContent = '', 2500);
}

// Bug fix: CSV の値にカンマ・改行・ダブルクォートが含まれる場合を正しくエスケープ
function csvField(val) {
  const s = String(val ?? '');
  if (s.includes(',') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
    return '"' + s.replace(/"/g, '""') + '"';
  }
  return s;
}

function exportCSV() {
  if (entries.length === 0) return;
  let csv = '日付,担当,カテゴリ,通貨,支払先,金額,メモ\n';
  entries.forEach(e => {
    csv += [e.date, e.owner, e.cat, e.currency, e.payee, e.amount, e.memo ?? '']
      .map(csvField).join(',') + '\n';
  });
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = `receipt_export_${Date.now()}.csv`;
  link.click();
}

updateMonthFilter();
</script>
</body>
