<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F172A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Receipts</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2310B981'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white'>🧾</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2310B981'/><text x='50' y='68' font-size='50' text-anchor='middle' fill='white'>🧾</text></svg>">
<link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22Family%20Receipt%22%2C%22short_name%22%3A%22Receipts%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230F172A%22%2C%22theme_color%22%3A%22%230F172A%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Crect%20width%3D'100'%20height%3D'100'%20rx%3D'20'%20fill%3D'%252310B981'%2F%3E%3Ctext%20x%3D'50'%20y%3D'68'%20font-size%3D'50'%20text-anchor%3D'middle'%20fill%3D'white'%3E%F0%9F%A7%BE%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #10B981;
    --primary-dark: #059669;
    --bg: #0F172A;
    --card: #1E293B;
    --text: #F8FAFC;
    --text-dim: #94A3B8;
    --border: #334155;
    --kensei: #3B82F6;
    --kazuki: #A855F7;
    --hirotaka: #F59E0B;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { 
    font-family: 'Inter', 'Noto Sans JP', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    line-height: 1.5;
    max-width: 500px;
    margin: 0 auto;
    padding-bottom: 80px;
}

.header { padding: 40px 20px 20px; background: linear-gradient(180deg, rgba(16,185,129,0.15) 0%, transparent 100%); }
.header h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; }
.dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 20px 20px; }
.stat-card { background: var(--card); padding: 12px; border-radius: 16px; border: 1px solid var(--border); text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
.stat-label { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; font-weight: 800; letter-spacing: 0.05em; }
.stat-value { font-size: 13px; font-weight: 700; }

.tabs { display: flex; padding: 0 20px; gap: 10px; margin-bottom: 20px; }
.tab { flex: 1; padding: 12px; border: none; border-radius: 12px; background: var(--card); color: var(--text-dim); font-weight: 600; cursor: pointer; transition: 0.2s; }
.tab.active { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }

.upload-zone { 
    margin: 0 20px 20px; padding: 40px 20px; border-radius: 24px; background: var(--card); 
    border: 2px dashed var(--primary); text-align: center; cursor: pointer;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2); transition: 0.2s;
}
.upload-zone:active { transform: scale(0.98); }
.upload-icon { font-size: 48px; margin-bottom: 12px; }

/* Modals */
.modal-overlay { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(15,23,42,0.9); z-index: 1000; 
    display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px);
}
.modal-box { background: var(--card); width: 85%; max-width: 400px; padding: 30px 25px; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); border: 1px solid var(--border); }
.modal-title { margin-bottom: 24px; font-weight: 800; text-align: center; font-size: 20px; }
.owner-btns { display: grid; gap: 12px; }
.owner-btn { padding: 16px; border: none; border-radius: 14px; color: white; font-weight: 800; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
.owner-btn:active { transform: scale(0.98); }

/* Verification Form */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-dim); margin-bottom: 6px; }
.form-group input, .form-group select { 
    width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); 
    background: rgba(15,23,42,0.5); color: var(--text); font-size: 16px; font-weight: 600;
}
.form-group input:focus { outline: 2px solid var(--primary); border-color: transparent; }
.flex-row { display: flex; gap: 12px; }
.save-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--primary); color: white; font-weight: 800; font-size: 16px; cursor: pointer; margin-top: 12px; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
.cancel-btn { width: 100%; padding: 12px; border: none; background: transparent; color: var(--text-dim); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }

.entry-card { background: var(--card); margin: 0 20px 12px; padding: 16px; border-radius: 20px; display: flex; align-items: center; gap: 16px; border: 1px solid var(--border); }
.owner-tag { width: 6px; height: 44px; border-radius: 3px; }
.entry-main { flex: 1; }
.entry-payee { font-weight: 800; font-size: 16px; margin-bottom: 2px; }
.entry-meta { font-size: 12px; color: var(--text-dim); font-weight: 600; }
.entry-amount { text-align: right; font-weight: 800; font-size: 16px; }

.hidden { display: none; }
</style>
</head>
<body>

<div class="header">
    <h1>Receipts</h1>
    <p style="color: var(--text-dim); font-size: 13px; font-weight: 600;">Family Expense Tracker</p>
</div>

<div class="dashboard">
    <div class="stat-card" style="border-top: 3px solid var(--kensei)">
        <div class="stat-label">KENSEI</div>
        <div class="stat-value" id="total-kensei">$0 / ¥0</div>
    </div>
    <div class="stat-card" style="border-top: 3px solid var(--kazuki)">
        <div class="stat-label">KAZUKI</div>
        <div class="stat-value" id="total-kazuki">$0 / ¥0</div>
    </div>
    <div class="stat-card" style="border-top: 3px solid var(--hirotaka)">
        <div class="stat-label">HIROTAKA</div>
        <div class="stat-value" id="total-hirotaka">¥0</div>
    </div>
</div>

<div class="tabs">
    <button class="tab active" onclick="showSection('add')">Scan</button>
    <button class="tab" onclick="showSection('list')">History</button>
</div>

<section id="sec-add">
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
        <div class="upload-icon">📸</div>
        <p style="font-weight: 800; font-size: 18px; margin-bottom: 4px;">Snap a Receipt</p>
        <p style="font-size: 13px; color: var(--text-dim); font-weight: 600;">AI Scanning & Double Check</p>
        <input type="file" id="file-input" class="hidden" accept="image/*" onchange="processImage(event)">
    </div>
</section>

<section id="sec-list" class="hidden">
    <div id="list-container"></div>
</section>

<div id="owner-modal" class="modal-overlay">
    <div class="modal-box">
        <h2 class="modal-title">👤 Who paid for this?</h2>
        <div class="owner-btns">
            <button class="owner-btn" style="background: var(--kensei)" onclick="setOwner('Kensei')">Kensei</button>
            <button class="owner-btn" style="background: var(--kazuki)" onclick="setOwner('Kazuki')">Kazuki</button>
            <button class="owner-btn" style="background: var(--hirotaka)" onclick="setOwner('Hirotaka')">Hirotaka</button>
        </div>
        <button class="cancel-btn" onclick="closeModals()">Cancel</button>
    </div>
</div>

<div id="verify-modal" class="modal-overlay">
    <div class="modal-box">
        <h2 class="modal-title">🔍 Verify Data</h2>
        <div class="form-group">
            <label>STORE / PAYEE</label>
            <input type="text" id="v-payee">
        </div>
        <div class="flex-row">
            <div class="form-group" style="flex: 2;">
                <label>AMOUNT</label>
                <input type="number" id="v-amount" step="0.01">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>CURRENCY</label>
                <select id="v-currency">
                    <option value="SGD">SGD ($)</option>
                    <option value="JPY">JPY (¥)</option>
                </select>
            </div>
        </div>
        <button class="save-btn" onclick="confirmEntry()">Confirm & Save</button>
        <button class="cancel-btn" onclick="closeModals()">Cancel</button>
    </div>
</div>

<script>
let entries = JSON.parse(localStorage.getItem('receipts_v2') || '[]');
let tempEntry = null;

function showSection(s) {
    document.getElementById('sec-add').classList.toggle('hidden', s !== 'add');
    document.getElementById('sec-list').classList.toggle('hidden', s !== 'list');
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i===0 && s==='add') || (i===1 && s==='list')));
    if(s === 'list') renderList();
}

function processImage(e) {
    const file = e.target.files[0];
    if(!file) return;

    document.querySelector('.upload-zone p').innerText = "Analyzing image...";
    
    setTimeout(() => {
        tempEntry = {
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            payee: "Sample Store",
            amount: Math.floor(Math.random() * 3000) + 50
        };
        
        document.getElementById('owner-modal').style.display = 'flex';
        document.querySelector('.upload-zone p').innerText = "Snap a Receipt";
        e.target.value = '';
    }, 1200);
}

function setOwner(name) {
    tempEntry.owner = name;
    document.getElementById('owner-modal').style.display = 'none';
    
    tempEntry.currency = (name === 'Hirotaka') ? 'JPY' : 'SGD';
    
    document.getElementById('v-payee').value = tempEntry.payee;
    document.getElementById('v-amount').value = tempEntry.amount;
    document.getElementById('v-currency').value = tempEntry.currency;
    
    document.getElementById('verify-modal').style.display = 'flex';
}

function confirmEntry() {
    tempEntry.payee = document.getElementById('v-payee').value;
    tempEntry.amount = Number(document.getElementById('v-amount').value);
    tempEntry.currency = document.getElementById('v-currency').value;
    
    if(!tempEntry.payee || !tempEntry.amount) {
        alert("Please fill in all fields.");
        return;
    }

    entries.unshift(tempEntry);
    localStorage.setItem('receipts_v2', JSON.stringify(entries));
    
    closeModals();
    updateDashboard();
    
    showSection('list');
}

function closeModals() {
    document.getElementById('owner-modal').style.display = 'none';
    document.getElementById('verify-modal').style.display = 'none';
    tempEntry = null;
}

function updateDashboard() {
    const totals = { Kensei: { JPY: 0, SGD: 0 }, Kazuki: { JPY: 0, SGD: 0 }, Hirotaka: { JPY: 0, SGD: 0 } };

    entries.forEach(e => {
        if(totals[e.owner]) {
            if(e.currency === 'SGD') totals[e.owner].SGD += e.amount;
            else totals[e.owner].JPY += e.amount;
        }
    });

    const fmtSGD = (num) => num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    const fmtJPY = (num) => num.toLocaleString('ja-JP');

    document.getElementById('total-kensei').innerText = `$${fmtSGD(totals.Kensei.SGD)} \n ¥${fmtJPY(totals.Kensei.JPY)}`;
    document.getElementById('total-kazuki').innerText = `$${fmtSGD(totals.Kazuki.SGD)} \n ¥${fmtJPY(totals.Kazuki.JPY)}`;
    document.getElementById('total-hirotaka').innerText = `¥${fmtJPY(totals.Hirotaka.JPY)}`;
}

function renderList() {
    const container = document.getElementById('list-container');
    if(entries.length === 0) {
        container.innerHTML = '<p style="text-align:center; margin-top:50px; color:var(--text-dim); font-weight:600;">No data yet</p>';
        return;
    }
    container.innerHTML = entries.map(e => `
        <div class="entry-card">
            <div class="owner-tag" style="background: var(--${e.owner.toLowerCase()})"></div>
            <div class="entry-main">
                <div class="entry-payee">${e.payee}</div>
                <div class="entry-meta">${e.date} • for ${e.owner}</div>
            </div>
            <div class="entry-amount" style="color: ${e.currency === 'SGD' ? '#10B981' : '#F8FAFC'}">
                ${e.currency === 'SGD' ? '$' : '¥'}${e.currency === 'SGD' ? e.amount.toFixed(2) : e.amount.toLocaleString()}
            </div>
        </div>
    `).join('');
}

updateDashboard();
</script>
</body>
</html>
